<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký - FPT Support</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:url("/static/background.jpg");
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.15);
}

.logo{
    position:absolute;
    top:20px;
    left:30px;
    z-index:2;
}

.logo img{
    height:100px;
}

.container{
    position:relative;
    z-index:2;

    width:400px;

    background:rgba(255,255,255,0.95);

    padding:40px;

    border-radius:20px;

    box-shadow:0 0 20px rgba(0,0,0,0.2);

    text-align:center;
}

h1{
    color:#f57c00;
    margin-bottom:30px;
}

input{

    width:100%;

    padding:15px;

    margin-bottom:20px;

    border:none;

    border-radius:10px;

    background:#f4f4f4;

    font-size:16px;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#f57c00;

    color:white;

    font-size:18px;

    cursor:pointer;
}

button:hover{
    background:#e26d00;
}

p{
    margin-top:20px;
}

a{
    color:#f57c00;
    text-decoration:none;
    font-weight:bold;
}
.password-box{
    position:relative;
    margin-bottom:20px;
}

.password-box input{
    width:100%;
    margin-bottom:0;
}

.eye-btn{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:20px;
    color:#777;
    user-select:none;
}

.eye-btn:hover{
    color:#f57c00;
}
</style>

</head>
<body>

<div class="logo">
    <img src="/static/fptulogo.png">
</div>

<div class="container">

    <h1>ĐĂNG KÝ</h1>
    {% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

    <form method="POST">

        <input
        type="text"
        name="username"
        placeholder="Tên tài khoản"
        required>

        <div class="password-box">
    <input
        type="password"
        name="password"
        id="password"
        placeholder="Mật khẩu"
        required
    >

    <span class="eye-btn" onclick="togglePassword()">
        👁
    </span>
</div>

        <button type="submit">
            Đăng ký
        </button>

    </form>

    <p>

        Đã có tài khoản?

        <a href="/login">

            Đăng nhập

        </a>

    </p>

</div>
<script>
function togglePassword(){

    let x = document.getElementById("password");

    if(x.type == "password"){

        x.type = "text";

    }

    else{

        x.type = "password";

    }
}
</script>
</body>
</html>
