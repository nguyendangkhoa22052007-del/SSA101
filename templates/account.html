<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tài khoản - FPT Support</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    height:100vh;
    background:url("/static/background.jpg");
    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.15);
}

.logo{
    position:absolute;
    top:20px;
    left:30px;
    z-index:2;
}

.logo img{
    height:100px;
}

.container{

    position:relative;
    z-index:2;

    width:450px;

    background:rgba(255,255,255,0.95);

    padding:45px;

    border-radius:20px;

    box-shadow:0 0 20px rgba(0,0,0,0.2);

}

h1{

    color:#f57c00;

    text-align:center;

    margin-bottom:35px;
}

.info{

    margin-bottom:30px;
}

.label{

    color:gray;

    margin-bottom:10px;

    font-size:15px;
}

.value{

    font-size:20px;

    font-weight:bold;
}

.btn{

    display:block;

    text-decoration:none;

    text-align:center;

    padding:15px;

    border-radius:10px;

    margin-top:20px;

    color:white;

    font-size:18px;

    transition:0.3s;
}

.home{
    background:#f57c00;
}

.home:hover{
    background:#df6b00;
}

.logout{
    background:#d32f2f;
}

.logout:hover{
    background:#b71c1c;
}

</style>
</head>

<body>

<div class="logo">
    <img src="/static/fptulogo.png">
</div>

<div class="container">

    <h1>👤 TÀI KHOẢN</h1>

    <div class="info">

        <div class="label">
            Tên tài khoản
        </div>

        <div class="value">
            {{ username }}
        </div>

    </div>

    <div class="info">

        <div class="label">
            Mật khẩu
        </div>

        <div class="value">
            ********
        </div>

    </div>

    <a href="/" class="btn home">

        Về trang chủ

    </a>

    <a href="/logout" class="btn logout">

        Đăng xuất

    </a>

</div>

</body>
</html>
