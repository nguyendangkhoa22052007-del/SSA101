<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vocab</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- NAV -->
<div class="bg-white shadow p-4 flex justify-between items-center">

    <!-- LOGO -->
    <div class="flex items-center gap-3">
        <img src="{{ url_for('static', filename='fptulogo.png') }}"
             class="h-10 w-auto">

        <div class="font-bold text-orange-500 text-lg">
            FPT SUPPORT
        </div>
    </div>

    <!-- MENU -->
    <div class="space-x-6 font-semibold">
    <a href="/">Trang chủ</a>
    <a href="/vocab">Thuật ngữ</a>
    <a href="/study">Học tập</a>
    <a href="/forum">Hỏi đáp</a>
    <a href="/logout" class="text-red-500">
        Đăng xuất
    </a>
</div>
</div>


<!-- MAIN -->
<div class="max-w-6xl mx-auto mt-8 grid grid-cols-3 gap-6">

<!-- LEFT -->
<div class="col-span-2 bg-white p-6 rounded-xl shadow border-t-4 border-orange-400">

    <h1 class="text-2xl font-bold text-orange-500 mb-2">
        {{ title }}
    </h1>

    <!-- SEARCH (ĐÃ ĐƯA LÊN TRÊN) -->
    <form action="/tim-kiem" method="POST" class="search-form-vocab mb-5" autocomplete="off">
    <div class="search-wrap-vocab">
        <input id="search-input" name="keyword"
               class="border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-300"
               placeholder="Nhập thuật ngữ...">
               
        <ul id="suggest-list" class="suggest-list" role="listbox" aria-label="Gợi ý tìm kiếm"></ul>
    </div>
    
    <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white px-4 rounded-lg search-btn-vocab">
        Tìm
    </button>
    </form>

    <!-- MEANING & DEFINITION (ĐÃ TÁCH BIỆT KHÔNG BỊ DÍNH CHÙM) -->
    <div class="bg-orange-50 p-6 rounded-lg border border-orange-100 min-h-[150px] space-y-4">
        
        <!-- Khung định nghĩa ngắn gọn -->
        <div>
            <p id="definition" class="text-gray-900 text-lg font-medium leading-relaxed">
                {{ definition }}
            </p>
        </div>
        
        <!-- Đường kẻ phân cách mờ -->
        <hr class="border-orange-200">

        <!-- Khung ý nghĩa / giải thích chi tiết -->
        <div>
            <p id="meaning" class="text-gray-700 text-base leading-relaxed whitespace-pre-line">
                {{ meaning }}
            </p>
        </div>

    </div>

</div>


<!-- RIGHT -->
<div class="bg-white p-6 rounded-xl shadow border-t-4 border-blue-400">

    <h2 class="font-bold mb-4 text-blue-500">Danh sách thuật ngữ</h2>

    <div class="space-y-2 max-h-[500px] overflow-y-auto">

        {% for tu in ds_thuat_ngu %}
    <a href="/thuatngu/{{ tu }}" 
        class="block p-3 rounded-lg bg-gray-50 hover:bg-orange-100 hover:text-orange-600 transition-all text-left font-medium content-link">
        {{ tu }}
    </a>
        {% endfor %}

    </div>

</div>

</div>


<!-- JS -->
<script>
function loadWord(word){

    fetch("/api/thuatngu/" + encodeURIComponent(word))
    .then(res => res.json())
    .then(data => {

        // Cập nhật tiêu đề thuật ngữ chính
        document.querySelector("h1").innerText = data.title;

        // Cập nhật định nghĩa (nếu backend trả về trường data.definition)
        if (document.getElementById("definition")) {
            document.getElementById("definition").innerText = data.definition || "Đang cập nhật...";
        }

        // Cập nhật nội dung ý nghĩa
        document.getElementById("meaning").innerText = data.meaning;

    });

}
</script>
<script src="{{ url_for('static', filename='search-suggest.js') }}"></script>
<script>
  // Đặt ID hoặc Class cho cái khung chứa danh sách thuật ngữ (khung có scrollbar)
  const sidebar = document.getElementById('sidebar-lists') || document.querySelector('.overflow-y-auto');

  if (sidebar) {
    //1. Khi trang vừa load xong: Kiểm tra xem trước đó có lưu vị trí cuộn không, nếu có thì cuộn tới đó
    const savedScrollTop = localStorage.getItem('sidebarScrollPos');
    if (savedScrollTop) {
      sidebar.scrollTop = parseInt(savedScrollTop, 10);
    }

    //2. Khi người dùng click vào bất kỳ từ nào: Lưu vị trí cuộn hiện tại lại trước khi trang bị chuyển hướng
    document.querySelectorAll('.content-link').forEach(link => {
      link.addEventListener('click', () => {
        localStorage.setItem('sidebarScrollPos', sidebar.scrollTop);
      });
    });
  }
</script>
</body>
</html>
