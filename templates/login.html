<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - FPT Support</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    height:100vh;
    background:url("/static/background.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.15);
}

.logo{
    position:absolute;
    top:20px;
    left:30px;
    z-index:2;
}

.logo img{
    height:100px;
}

.container{
    position:relative;
    z-index:2;
    width:400px;
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#f57c00;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:none;
    background:#f4f4f4;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#f57c00;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e26d00;
}

p{
    margin-top:20px;
}

a{
    text-decoration:none;
    color:#f57c00;
    font-weight:bold;
}

.password-box{
    position:relative;
    margin-bottom:10px; 
}

.password-box input{
    width:100%;
    margin-bottom:0;
}

.eye-btn{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:20px;
    color:#777;
    user-select:none;
}

.eye-btn:hover{
    color:#f57c00;
}

.forgot-password-link {
    text-align: right;
    margin-bottom: 20px;
}

.forgot-password-link a {
    font-size: 14px;
    font-weight: normal;
    color: #666;
    transition: 0.2s;
}

.forgot-password-link a:hover {
    color: #f57c00;
    text-decoration: underline;
}

.error {
    color: red;
    font-weight: bold;
    margin-bottom: 20px;
}

/* Thêm định dạng thông báo thành công khi đổi pass xong quay lại */
.success {
    color: green;
    font-weight: bold;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="logo">
    <img src="/static/fptulogo.png">
</div>

<div class="container">
    <h1>ĐĂNG NHẬP</h1>
    
    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="success">
        {{ success }}
    </div>
    {% endif %}

    <form method="POST">
        <input
        type="text"
        name="username"
        placeholder="Tên tài khoản"
        required>
        
        <div class="password-box">
            <input
            type="password"
            name="password"
            id="password"
            placeholder="Mật khẩu"
            required>
            <span class="eye-btn" id="eye-icon" onclick="togglePassword()">👁️</span>
        </div>

        <div class="forgot-password-link">
            <a href="/forgot-password">Quên mật khẩu?</a>
        </div>

        <button type="submit">
            Đăng nhập
        </button>
    </form>

    <p>
        Chưa có tài khoản?
        <a href="/register">Đăng ký</a>
    </p>
</div>

<script>
function togglePassword(){
    let x = document.getElementById("password");
    let icon = document.getElementById("eye-icon");

    if(x.type === "password"){
        x.type = "text";
        icon.textContent = "🙈"; 
    }
    else{
        x.type = "password";
        icon.textContent = "👁️"; 
    }
}
</script>

</body>
</html>
