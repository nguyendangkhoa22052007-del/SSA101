<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quên mật khẩu - FPT Support</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    height:100vh;
    background:url("/static/background.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.15);
}

.logo{
    position:absolute;
    top:20px;
    left:30px;
    z-index:2;
}

.logo img{
    height:100px;
}

.container{
    position:relative;
    z-index:2;
    width:420px;
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#f57c00;
    margin-bottom:25px;
    font-size:24px;
}

input, select {
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:none;
    background:#f4f4f4;
    border-radius:10px;
    font-size:16px;
}

.security-box {
    text-align: left;
    background: #fff3e0;
    padding: 15px;
    border-left: 5px solid #f57c00;
    border-radius: 5px;
    margin-bottom: 20px;
    font-size: 16px;
}

.security-box strong {
    color: #e65100;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#f57c00;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e26d00;
}

.error {
    color: red;
    font-weight: bold;
    margin-bottom: 20px;
}

.btn-back {
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#666;
    font-size: 15px;
}
.btn-back:hover {
    color: #f57c00;
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="logo">
    <img src="/static/fptulogo.png">
</div>

<div class="container">
    <h1>🔑 KHÔI PHỤC MẬT KHẨU</h1>
    
    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    {% if not security_question %}
    <form method="POST" action="/forgot-password">
        <input type="hidden" name="action" value="check_user">
        <p style="margin-bottom: 15px; color: #555; text-align: left;">Nhập tên tài khoản của bạn để lấy câu hỏi bảo mật:</p>
        <input 
            type="text" 
            name="username" 
            placeholder="Tên tài khoản" 
            required>
        <button type="submit">Tiếp tục</button>
    </form>

    {% else %}
    <form method="POST" action="/forgot-password">
        <input type="hidden" name="action" value="reset_password">
        <input type="hidden" name="username" value="{{ username }}">

        <div class="security-box">
            <span>Câu hỏi bảo mật của bạn:</span><br>
            <strong>📌 {{ security_question }}</strong>
        </div>

        <input 
            type="text" 
            name="security_answer" 
            placeholder="Câu trả lời của bạn" 
            required>

        <hr style="border: 0; height: 1px; background: #ddd; margin-bottom: 20px;">

        <input 
            type="password" 
            name="new_password" 
            placeholder="Mật khẩu mới" 
            required>

        <input 
            type="password" 
            name="confirm_password" 
            placeholder="Xác nhận mật khẩu mới" 
            required>

        <button type="submit">Xác nhận đổi mật khẩu</button>
    </form>
    {% endif %}

    <a href="/login" class="btn-back">⬅ Quay lại Đăng nhập</a>
</div>

</body>
</html>
